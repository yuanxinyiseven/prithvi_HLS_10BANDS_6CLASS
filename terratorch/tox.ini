[testenv:integration-tests-vllm-main-{py313,py312,py311}]
description = Run Terratorch integration tests with vLLM (main) using Python {envname}
skip_install = true
allowlist_externals =
    env
    git
    sh
    python
    rm
passenv =
    TEST_BRANCH
    CLEANUP_VENV
    UV_NO_CACHE
    PIP_NO_CACHE_DIR
setenv =
    VLLM_USE_PRECOMPILED = 1
    TERRATORCH_BRANCH_DIR = {envtmpdir}/terratorch_branch
deps =
    pytest
    geobenchv2>=0.9
    impactmesh>0.1.0
commands =
    env
    sh -c "if command -v uv >/dev/null 2>&1; then export PIP_CMD='uv pip'; else export PIP_CMD='pip'; fi && \
        if [ -n \"$TEST_BRANCH\" ]; then \
            $PIP_CMD install \"terratorch[vllm_test] @ git+https://github.com/torchgeo/terratorch.git@$TEST_BRANCH\"; \
        else \
            $PIP_CMD install -e .[vllm_test]; \
        fi && \
        WHEEL_ENV_FILE={envtmpdir}/vllm_wheel_env.sh python scripts/check_vllm_wheel.py && \
        if [ -f {envtmpdir}/vllm_wheel_env.sh ]; then . {envtmpdir}/vllm_wheel_env.sh && rm -f {envtmpdir}/vllm_wheel_env.sh; fi && \
        $PIP_CMD install https://github.com/vllm-project/vllm.git && \
        $PIP_CMD show terratorch && \
        $PIP_CMD show vllm"

    pytest -s -v integrationtests/vLLM
commands_post =
    sh -c "if [ -n \"$CLEANUP_VENV\" ]; then rm -rf {envdir}; fi"

[testenv:vllm-tests-tt-main-{py313,py312,py311}]
description = Run vLLM (main) io processor plugin with TerraTorch current branch using with Python {envname}
skip_install = true
allowlist_externals =
    env
    git
    sh
    python
    rm
passenv =
    TEST_BRANCH
    CLEANUP_VENV
    UV_NO_CACHE
    PIP_NO_CACHE_DIR
setenv =
    VLLM_USE_PRECOMPILED = 1
    VLLM_SOURCE_DIR = {envtmpdir}/vllm
    TERRATORCH_BRANCH_DIR = {envtmpdir}/terratorch_branch
deps =
    pytest
    pytest-asyncio
    geobenchv2>=0.9
    impactmesh>0.1.0
    tblib
commands =
    env
    sh -c "if command -v uv >/dev/null 2>&1; then export PIP_CMD='uv pip'; else export PIP_CMD='pip'; fi && \
        if [ -n \"$TEST_BRANCH\" ]; then \
            $PIP_CMD install \"terratorch[vllm_test] @ git+https://github.com/torchgeo/terratorch.git@$TEST_BRANCH\"; \
        else \
            $PIP_CMD install -e .[vllm_test]; \
        fi && \
        git clone -b main --single-branch --depth 1 https://github.com/vllm-project/vllm.git {env:VLLM_SOURCE_DIR} && \
        VLLM_DIR={env:VLLM_SOURCE_DIR} WHEEL_ENV_FILE={envtmpdir}/vllm_wheel_env.sh python scripts/check_vllm_wheel.py && \
        if [ -f {envtmpdir}/vllm_wheel_env.sh ]; then . {envtmpdir}/vllm_wheel_env.sh && rm -f {envtmpdir}/vllm_wheel_env.sh; fi && \
        $PIP_CMD install {env:VLLM_SOURCE_DIR} && \
        $PIP_CMD install {env:VLLM_SOURCE_DIR}/tests/plugins/prithvi_io_processor_plugin && \
        $PIP_CMD show terratorch && \
        $PIP_CMD show vllm"
    pytest -s -v {env:VLLM_SOURCE_DIR}/tests/plugins_tests/test_terratorch_io_processor_plugins.py
    rm -rf {env:VLLM_SOURCE_DIR}
commands_post =
    sh -c "if [ -n \"$CLEANUP_VENV\" ]; then rm -rf {envdir}; fi"