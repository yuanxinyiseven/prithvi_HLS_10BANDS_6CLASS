[tox]
requires =
    tox >= 4.20
env_list =
    py313
    py312
    py311
    py310

[testenv]
basepython =
    py313: python3.13
    py312: python3.12
    py311: python3.11
    py310: python3.10
deps =
    pytest
    .[wxc,test,geobenchv2]
commands = pytest -s -v tests
commands_post =
    sh -c "if [ -n \"$CLEANUP_VENV\" ]; then rm -rf {envdir}; fi"

[testenv:integration-tests-base-set-{py313,py312,py311}]
description = Run specific integration test function from test_base_set.py using Python {envname}
skip_install = true
allowlist_externals =
    env
    git
    sh
    rm
passenv =
    TEST_BRANCH
    TEST_FUNCTION
    TERRATORCH_TMP_ROOT
    CLEANUP_VENV
    UV_NO_CACHE
    PIP_NO_CACHE_DIR
setenv =
    TERRATORCH_BRANCH_DIR = {envtmpdir}/terratorch_branch
deps =
    pytest
commands =
    env
    sh -c "if command -v uv >/dev/null 2>&1; then export PIP_CMD='uv pip'; else export PIP_CMD='pip'; fi && \
        if [ -n \"$TEST_BRANCH\" ]; then \
            $PIP_CMD install \"terratorch[test] @ git+https://github.com/torchgeo/terratorch.git@$TEST_BRANCH\"; \
        else \
            $PIP_CMD install -e .[test]; \
        fi && \
        $PIP_CMD show terratorch"
    pytest -s -v integrationtests/test_base_set.py::{env:TEST_FUNCTION}
commands_post =
    sh -c "if [ -n \"$CLEANUP_VENV\" ]; then rm -rf {envdir}; fi"

[testenv:integration-tests-vllm-release-{py313,py312,py311}]
description = Run Terratorch integration tests with vLLM (release) using Python {envname}
skip_install = true
allowlist_externals =
    env
    git
    sh
    rm
passenv =
    TEST_BRANCH
    CLEANUP_VENV
    UV_NO_CACHE
    PIP_NO_CACHE_DIR
setenv =
    TERRATORCH_BRANCH_DIR = {envtmpdir}/terratorch_branch
deps =
    pytest
commands =
    env
    sh -c "if command -v uv >/dev/null 2>&1; then export PIP_CMD='uv pip'; else export PIP_CMD='pip'; fi && \
        if [ -n \"$TEST_BRANCH\" ]; then \
            $PIP_CMD install \"terratorch[vllm,vllm_test] @ git+https://github.com/torchgeo/terratorch.git@$TEST_BRANCH\"; \
        else \
            $PIP_CMD install -e .[vllm,vllm_test]; \
